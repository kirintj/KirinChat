# docker-compose.override.yml
# 本地开发环境覆盖配置
# 自动加载，无需 -f 指定
#
# 使用前请先创建 .env 文件:
#   cp .env.example .env
# 然后编辑 .env 填入真实值

version: '3.8'

services:
  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: kirinchat
      MYSQL_USER: kirinchat_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
      TZ: Asia/Shanghai

  backend:
    environment:
      TZ: Asia/Shanghai
      REDIS_URL: redis://redis:6379
      MYSQL_ENDPOINT: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-123456}@mysql:3306/kirinchat
      MYSQL_ASYNC_ENDPOINT: mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-123456}@mysql:3306/kirinchat
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: kirinchat
    env_file:
      - .env

  celery-worker:
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MYSQL_ENDPOINT=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-123456}@mysql:3306/kirinchat
      - MYSQL_ASYNC_ENDPOINT=mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-123456}@mysql:3306/kirinchat
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=kirinchat
    env_file:
      - .env

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
