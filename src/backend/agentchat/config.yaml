# 服务配置
server:
  env: "dev" # prod / test / dev
  host: "127.0.0.1"
  port: 7860
  name: "AgentChat" # 项目名称
  version: "2.5.0" # 服务版本号

# 数据库配置：MySQL (请根据实际配置更改 endpoint)
# 格式：mysql+pymysql://<user>:<password>@<host>:<port>/<database>
mysql:
  endpoint: "mysql+pymysql://root:123456@localhost:3307/agentchat" # 同步连接配置
  async_endpoint: "mysql+aiomysql://root:123456@localhost:3307/agentchat" # 异步连接配置

# 缓存配置：Redis
redis:
  endpoint: "redis://localhost:6379" # Redis 连接地址

# 多模型服务配置 (LLM、Embedding、Rerank)
multi_models:
  # 对话模型配置
  conversation_model:
    api_key: "YOUR_DASHSCOPE_API_KEY"
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    model_name: "mimo-v2.5"
  # 工具调用/Function Call 模型配置
  tool_call_model:
    api_key: "YOUR_DASHSCOPE_API_KEY"
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    model_name: "mimo-v2.5"
  # 复杂推理模型配置
  reasoning_model:
    api_key: "YOUR_DASHSCOPE_API_KEY"
    base_url: "https://token-plan-cn.xiaomimimo.com/v11"
    model_name: "mimo-v2.5"
  # 文生图模型配置
  text2image:
    api_key: "YOUR_DASHSCOPE_API_KEY"
    base_url: "https://dashscope.aliyuncs.com/api/v1/services/aigc/text2image/image-synthesis"
    model_name: "wanx2.0-t2i-turbo"
  # 多模态 (视觉) 模型配置
  qwen_vl:
    api_key: "YOUR_DASHSCOPE_API_KEY"
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    model_name: "mimo-v2.5"

  # Embedding 模型配置 (本地 BGE-M3)
  embedding:
    api_key: "not-needed"
    base_url: "http://127.0.0.1:8080/v1"
    model_name: "bge-m3"

  # Rerank 模型配置 (本地 BGE-Reranker-Base)
  rerank:
    api_key: "not-needed"
    base_url: "http://127.0.0.1:8080/v1/rerank"
    model_name: "bge-reranker-base"


# 外部工具 (Tool) 配置
tools:
  # 高德地图天气 API 配置
  weather:
    api_key: "YOUR_WEATHER_API_KEY"
    endpoint: "https://restapi.amap.com/v3/weather/weatherInfo?parameters"
  # Tavily 联网搜索 API 配置 (注意配额限制)
  tavily:
    api_key: "YOUR_TAVILY_API_KEY"
  # SerpApi 上的 Google Search API 配置
  google:
    api_key: "YOUR_GOOGLE_API_KEY"
  # 阿里云快递查询 API 配置
  delivery:
    api_key: "YOUR_DELIVERY_API_KEY"
    endpoint: "https://qyexpress.market.alicloudapi.com/composite/queryexpress"
  # BoCha 联网搜索 API 配置
  bocha:
    api_key: "sk-**********************"
    endpoint: "https://api.bochaai.com/v1/web-search"

# RAG (检索增强生成) 配置
rag:
  enable_summary: False # 是否对知识库片段进行摘要
  enable_elasticsearch: False # 是否启用 Elasticsearch 进行关键词搜索
  enable_ik_analyzer: False # 是否启用 Elasticsearch 的IK分词器

  retrival:
    top_k: 5  # 知识库召回的最大数量
    min_score: 0.2 # 知识库召回结果的最小相似度分数阈值

  split:
    chunk_size: 500 # 知识库文档分块的最大字符数
    overlap_size: 100 # 文档分块之间的重叠字符数

  # ES数据库配置，主要做关键词召回
  elasticsearch:
    hosts: "http://127.0.0.1:9200" # Elasticsearch 连接地址。如果 'enable_elasticsearch' 为 False，则不需要填写。

  # 向量数据库配置 (Vector DB)
  vector_db:
    host: "127.0.0.1"
    port: "19530"
    mode: "chroma" # 向量库模式: standalone (Milvus), lite (轻量Milvus), chroma (ChromaDB)

# 阿里云对象存储 OSS 配置
storage:
  mode: "minio" # or oss

  oss:
    access_key_id: "LTAI5tL85xWWx9gb*******"
    access_key_secret: "MiKCkLCx9qZzxc*****"
    endpoint: "oss-cn-beijing.aliyuncs.com"
    bucket_name: "agentchat" # OSS 存储桶名称
    base_url: "https://agentchat.oss-cn-beijing.aliyuncs.com" # 访问基础 URL

  minio:
    access_key_id: "minioadmin"
    access_key_secret: "minioadmin"
    endpoint: "127.0.0.1:9000"
    bucket_name: "agentchat" # minio 存储桶名称
    base_url: "http://127.0.0.1:9000/agentchat" # 访问基础 URL

# 默认配置 (如图标 URL, 资源链接)
default_config:
  mcp_logo_url: "https://agentchat.oss-cn-beijing.aliyuncs.com/icons/mcp/mcp.png"
  tool_logo_url: "https://agentchat.oss-cn-beijing.aliyuncs.com/icons/tools/default.png" # 工具默认图标 URL
  agent_logo_url: "https://agentchat.oss-cn-beijing.aliyuncs.com/icons/tools/bot.png" # Agent 默认图标 URL
  mars_daily_url: "https://news.aibase.com/zh/news" # 外部新闻链接
  memory_collection_name: "memory" # 记忆存储的集合名称

# 扩展功能：微信配置 (不添加也可正常运行)
wechat_config:
  token: "YOUR_WECHAT_TOKEN"
  app_id: "YOUR_WECHAT_APP_ID"
  secret: "YOUR_WECHAT_SECRET"

# 追踪工具 Langfuse 配置 (目前版本可能未应用)
langfuse:
  trace_name: "agentchat"
  host: "https://cloud.langfuse.com"
  public_key: "YOUR_LANGFUSE_PUBLIC_KEY" # Langfuse 公钥
  secret_key: "YOUR_LANGFUSE_SECRET_KEY" # Langfuse 私钥
  user_id: "kirin" # 用户 ID

# 接口白名单路径
whitelist_paths: ["/mcp/*"]