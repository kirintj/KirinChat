# 本地开发环境配置
# 数据库指向 Docker 容器

server:
  env: "dev"
  host: "127.0.0.1"
  port: 7860
  name: "KirinChat"
  version: "2.5.0"

# 数据库配置（指向 Docker 容器）
mysql:
  endpoint: "${MYSQL_ENDPOINT}"
  async_endpoint: "${MYSQL_ASYNC_ENDPOINT}"

redis:
  endpoint: "${REDIS_ENDPOINT}"

# AI 模型配置
multi_models:
  conversation_model:
    api_key: "${CONVERSATION_MODEL_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "qwen-plus"
  tool_call_model:
    api_key: "${TOOL_CALL_MODEL_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "qwen-plus"
  reasoning_model:
    api_key: "${REASONING_MODEL_API_KEY}"
    base_url: "https://api.deepseek.com/v1"
    model_name: "deepseek-reasoner"
  text2image:
    api_key: "${TEXT2IMAGE_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/api/v1/services/aigc/text2image/image-synthesis"
    model_name: "wanx2.0-t2i-turbo"
  qwen_vl:
    api_key: "${QWEN_VL_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "qwen-vl-plus"
  embedding:
    api_key: "${EMBEDDING_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "text-embedding-v4"
  rerank:
    api_key: "${RERANK_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank"
    model_name: "gte-rerank-v2"

# 工具配置
tools:
  weather:
    api_key: "${WEATHER_API_KEY}"
    endpoint: "https://restapi.amap.com/v3/weather/weatherInfo?parameters"
  tavily:
    api_key: "${TAVILY_API_KEY}"
  google:
    api_key: "${GOOGLE_SEARCH_API_KEY}"
  delivery:
    api_key: "${DELIVERY_API_KEY}"
    endpoint: "https://qyexpress.market.alicloudapi.com/composite/queryexpress"
  bocha:
    api_key: "${BOCHA_API_KEY}"
    endpoint: "https://api.bochaai.com/v1/web-search"

# RAG 配置
rag:
  enable_summary: False
  enable_elasticsearch: False
  enable_ik_analyzer: False
  retrival:
    top_k: 5
    min_score: 0.2
  split:
    chunk_size: 500
    overlap_size: 100
  elasticsearch:
    hosts: "http://127.0.0.1:9200"
  vector_db:
    host: "127.0.0.1"
    port: "19530"
    mode: "chroma"

# 存储配置（指向 Docker 中的 MinIO）
storage:
  mode: "minio"
  oss:
    access_key_id: "${OSS_ACCESS_KEY_ID}"
    access_key_secret: "${OSS_ACCESS_KEY_SECRET}"
    endpoint: "oss-cn-beijing.aliyuncs.com"
    bucket_name: "agentchat"
    base_url: "https://agentchat.oss-cn-beijing.aliyuncs.com"
  minio:
    access_key_id: "${MINIO_ACCESS_KEY}"
    access_key_secret: "${MINIO_SECRET_KEY}"
    endpoint: "127.0.0.1:9000"
    bucket_name: "agentchat"
    base_url: "http://127.0.0.1:9000/agentchat"

# 默认配置
default_config:
  mcp_logo_url: "https://agentchat.oss-cn-beijing.aliyuncs.com/icons/mcp/mcp.png"
  tool_logo_url: "https://agentchat.oss-cn-beijing.aliyuncs.com/icons/tools/default.png"
  agent_logo_url: "https://agentchat.oss-cn-beijing.aliyuncs.com/icons/tools/bot.png"
  mars_daily_url: "https://news.aibase.com/zh/news"
  memory_collection_name: "memory"

# 微信配置（可选）
wechat_config:
  token: "${WECHAT_TOKEN}"
  app_id: "${WECHAT_APP_ID}"
  secret: "${WECHAT_SECRET}"

# Langfuse 配置（可选）
langfuse:
  trace_name: "kirinchat"
  host: "https://cloud.langfuse.com"
  public_key: "${LANGFUSE_PUBLIC_KEY}"
  secret_key: "${LANGFUSE_SECRET_KEY}"
  user_id: "kirin"

# 语音面试配置
voice_interview:
  asr_provider: "mimo"
  tts_provider: "mimo"
  llm_provider: "mimo"
  asr:
    model: "mimo-v2.5-asr"
    language: "zh"
  tts:
    model: "mimo-v2.5-tts"
    voice: "冰糖"
    sample_rate: 24000
  default_difficulty: "medium"
  default_duration: 30

whitelist_paths: ["/mcp/*"]

# CORS 配置
cors:
  enabled: true
  allowed_origins:
    - "http://localhost:5173"      # Vite 开发服务器
    - "http://localhost:3000"      # React 开发服务器
  allow_credentials: false
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "Accept"
  max_age: 3600
