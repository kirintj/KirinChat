<h2>鸿蒙宇宙蓝 — 组件视觉预览</h2>
<p class="subtitle">暗色模式下的核心组件风格</p>

<div class="mockup">
  <div class="mockup-header">暗色模式 · 核心组件一览</div>
  <div class="mockup-body" style="background: #0a1628; padding: 24px; border-radius: 8px;">

    <!-- Buttons -->
    <div style="margin-bottom: 24px;">
      <div style="color: #a0b4d0; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;">Buttons</div>
      <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
        <div style="background: #3370ff; color: #fff; padding: 10px 24px; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer;">主要按钮</div>
        <div style="background: transparent; color: #3370ff; padding: 10px 24px; border-radius: 12px; font-size: 14px; font-weight: 500; border: 1px solid rgba(51,112,255,0.4); cursor: pointer;">次要按钮</div>
        <div style="background: rgba(255,255,255,0.06); color: #a0b4d0; padding: 10px 24px; border-radius: 12px; font-size: 14px; cursor: pointer;">文字按钮</div>
        <div style="background: #e5432a; color: #fff; padding: 10px 24px; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer;">危险按钮</div>
        <div style="background: #3370ff; color: #fff; padding: 10px 24px; border-radius: 12px; font-size: 14px; font-weight: 500; opacity: 0.4; cursor: not-allowed;">禁用状态</div>
      </div>
    </div>

    <!-- Inputs -->
    <div style="margin-bottom: 24px;">
      <div style="color: #a0b4d0; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;">Inputs</div>
      <div style="display: flex; gap: 16px; flex-wrap: wrap;">
        <div style="position: relative;">
          <div style="color: #6b8299; font-size: 12px; margin-bottom: 6px;">用户名</div>
          <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 14px; color: #e8f0fe; font-size: 14px; min-width: 200px;">请输入用户名</div>
        </div>
        <div style="position: relative;">
          <div style="color: #6b8299; font-size: 12px; margin-bottom: 6px;">聚焦状态</div>
          <div style="background: rgba(51,112,255,0.06); border: 2px solid #3370ff; border-radius: 12px; padding: 9px 13px; color: #e8f0fe; font-size: 14px; min-width: 200px;">已聚焦输入框</div>
        </div>
        <div style="position: relative;">
          <div style="color: #6b8299; font-size: 12px; margin-bottom: 6px;">错误状态</div>
          <div style="background: rgba(229,67,42,0.06); border: 2px solid #e5432a; border-radius: 12px; padding: 9px 13px; color: #e8f0fe; font-size: 14px; min-width: 200px;">输入有误</div>
          <div style="color: #e5432a; font-size: 12px; margin-top: 4px;">此字段不能为空</div>
        </div>
      </div>
    </div>

    <!-- Cards -->
    <div style="margin-bottom: 24px;">
      <div style="color: #a0b4d0; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;">Cards</div>
      <div style="display: flex; gap: 16px; flex-wrap: wrap;">
        <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; min-width: 220px;">
          <div style="color: #e8f0fe; font-size: 15px; font-weight: 600; margin-bottom: 8px;">智能体卡片</div>
          <div style="color: #6b8299; font-size: 13px; line-height: 1.6;">这是一个扁平极简风格的卡片组件，使用微妙的半透明背景。</div>
        </div>
        <div style="background: rgba(51,112,255,0.08); border: 1px solid rgba(51,112,255,0.2); border-radius: 16px; padding: 20px; min-width: 220px;">
          <div style="color: #e8f0fe; font-size: 15px; font-weight: 600; margin-bottom: 8px;">选中状态</div>
          <div style="color: #a0b4d0; font-size: 13px; line-height: 1.6;">卡片被选中时，使用主色的半透明变体作为背景和边框。</div>
        </div>
      </div>
    </div>

    <!-- Tags -->
    <div style="margin-bottom: 24px;">
      <div style="color: #a0b4d0; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;">Tags & Badges</div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
        <div style="background: rgba(51,112,255,0.15); color: #5c9aff; padding: 4px 12px; border-radius: 8px; font-size: 12px;">默认标签</div>
        <div style="background: rgba(52,211,153,0.15); color: #34d399; padding: 4px 12px; border-radius: 8px; font-size: 12px;">成功</div>
        <div style="background: rgba(251,191,36,0.15); color: #fbbf24; padding: 4px 12px; border-radius: 8px; font-size: 12px;">警告</div>
        <div style="background: rgba(229,67,42,0.15); color: #f87171; padding: 4px 12px; border-radius: 8px; font-size: 12px;">错误</div>
      </div>
    </div>

    <!-- Toast / Message -->
    <div>
      <div style="color: #a0b4d0; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;">Toast Messages</div>
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <div style="background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.25); border-radius: 12px; padding: 12px 20px; color: #34d399; font-size: 13px; display: flex; align-items: center; gap: 8px;">
          <span style="font-size: 16px;">✓</span> 操作成功
        </div>
        <div style="background: rgba(229,67,42,0.12); border: 1px solid rgba(229,67,42,0.25); border-radius: 12px; padding: 12px 20px; color: #f87171; font-size: 13px; display: flex; align-items: center; gap: 8px;">
          <span style="font-size: 16px;">✕</span> 操作失败
        </div>
        <div style="background: rgba(51,112,255,0.12); border: 1px solid rgba(51,112,255,0.25); border-radius: 12px; padding: 12px 20px; color: #5c9aff; font-size: 13px; display: flex; align-items: center; gap: 8px;">
          <span style="font-size: 16px;">ℹ</span> 提示信息
        </div>
      </div>
    </div>

  </div>
</div>
